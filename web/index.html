<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>VietQR Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-900 text-white flex items-center justify-center min-h-screen"
  >
    <div class="bg-gray-800 p-6 rounded-lg shadow-xl w-80">
      <h2 class="text-xl font-bold mb-4 text-center">Gửi Lệnh Thanh Toán</h2>
      <input
        type="text"
        id="ip"
        placeholder="IP ESP32"
        class="w-full p-2 mb-3 rounded bg-gray-700 outline-none border border-gray-600 focus:border-blue-500"
      />
      <input
        type="text"
        id="name"
        placeholder="Tên khách / Nội dung"
        class="w-full p-2 mb-3 rounded bg-gray-700 outline-none border border-gray-600 focus:border-blue-500"
      />
      <input
        type="number"
        id="amount"
        placeholder="Số tiền"
        class="w-full p-2 mb-4 rounded bg-gray-700 outline-none border border-gray-600 focus:border-blue-500"
      />
      <button
        onclick="send()"
        class="w-full bg-blue-600 p-2 rounded font-bold hover:bg-blue-500 transition"
      >
        HIỂN THỊ QR
      </button>
      <p id="st" class="mt-3 text-center text-sm text-gray-400"></p>
    </div>
    <script>
      function send() {
        const ip = document.getElementById("ip").value;
        const n = document.getElementById("name").value;
        const a = document.getElementById("amount").value;
        const st = document.getElementById("st");
        if (!ip || !n || !a) return alert("Nhập đủ thông tin!");

        st.innerText = "Đang gửi...";
        st.className = "mt-3 text-center text-sm text-gray-400";

        // Bỏ { mode: "no-cors" } và kiểm tra response.ok
        fetch(`http://${ip}/update?amount=${a}&name=${encodeURIComponent(n)}`)
          .then((response) => {
            if (!response.ok) throw new Error("Server trả về lỗi");
            st.innerText = "Thành công!";
            st.className = "mt-3 text-center text-sm text-green-400";
          })
          .catch(() => {
            st.innerText = "Lỗi kết nối!";
            st.className = "mt-3 text-center text-sm text-red-400";
          });
      }
    </script>
  </body>
</html>
